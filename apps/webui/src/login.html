<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>WudiBuddy Agents - 登录</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="theme-color" content="#1F1F24" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --page-bg: #f3f6fa;
      --page-fg: #172033;
      --panel-bg: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(205, 214, 226, 0.9);
      --panel-shadow: 0 24px 60px rgba(23, 32, 51, 0.12), 0 1px 0 rgba(255, 255, 255, 0.8) inset;
      --muted: rgba(23, 32, 51, 0.5);
      --input-bg: #ffffff;
      --input-border: #ccd6e2;
      --placeholder: rgba(23, 32, 51, 0.38);
      --accent: #0f172a;
      --accent-hover: #1f2937;
      --focus: rgba(0, 132, 255, 0.18);
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-fg: #b91c1c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(243, 246, 250, 0.94)),
        var(--page-bg);
      color: var(--page-fg);
      padding: 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(23, 32, 51, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(23, 32, 51, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 78%);
    }

    .panel {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 30rem;
      padding: 36px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      text-align: center;
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand-logo {
      width: 132px;
      height: 132px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .brand-name {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .field + .field {
      margin-top: 16px;
    }

    input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      font-size: 14px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      outline: none;
      background: var(--input-bg);
      color: var(--page-fg);
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    input::placeholder {
      color: var(--placeholder);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus);
    }

    button {
      width: 100%;
      height: 44px;
      margin-top: 24px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
    }

    button:hover {
      background: var(--accent-hover);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.2);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      display: none;
      margin-top: 16px;
      padding: 10px 12px;
      font-size: 13px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      color: var(--error-fg);
      text-align: left;
    }

    .error.visible { display: block; }

    @media (prefers-reduced-motion: reduce) {
      button {
        transition: background 0.15s;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #10141b;
        --page-fg: #edf2f7;
        --panel-bg: rgba(19, 24, 32, 0.94);
        --panel-border: rgba(67, 78, 94, 0.82);
        --panel-shadow: 0 24px 70px rgba(0, 0, 0, 0.38), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
        --muted: rgba(237, 242, 247, 0.54);
        --input-bg: rgba(11, 15, 21, 0.82);
        --input-border: rgba(67, 78, 94, 0.9);
        --placeholder: rgba(224, 224, 232, 0.32);
        --accent: #edf2f7;
        --accent-hover: #dbe5ef;
        --focus: rgba(56, 189, 248, 0.18);
        --error-bg: #2d1a1a;
        --error-border: #5a2020;
        --error-fg: #f5a0a0;
      }

      body {
        background:
          linear-gradient(180deg, rgba(16, 20, 27, 0.96), rgba(20, 26, 35, 0.98)),
          var(--page-bg);
      }

      button {
        color: #10141b;
      }
    }

    @media (max-width: 520px) {
      .panel {
        padding: 28px 22px;
      }

      .brand-logo {
        width: 112px;
        height: 112px;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="brand">
      <img class="brand-logo" src="./icon-512.png" alt="WudiBuddy Agents">
      <div class="brand-name">WudiBuddy Agents</div>
    </div>

    <!-- [FORK] Keep employee login copy minimal and brand-focused. -->
    <h1>登录WudiBuddy Agents</h1>

    <form id="login-form">
      <div class="field">
        <label for="username">账号</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="请输入账号"
          autocomplete="username"
          autocapitalize="none"
          autocorrect="off"
          autofocus
          required
        >
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="请输入密码"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" id="submit-btn">登录WudiBuddy Agents</button>
    </form>

    <div id="error" class="error"></div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = '登录WudiBuddy Agents';

      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          // Cookie is set by the response — redirect to app
          window.location.href = '/';
          return;
        }

        const data = await res.json().catch(() => ({}));
        errorEl.textContent = data.error || '账号或密码不正确，请核对后重试。';
        errorEl.classList.add('visible');
      } catch (err) {
        errorEl.textContent = '暂时无法连接认证服务，请检查网络后重试。';
        errorEl.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录WudiBuddy Agents';
      }
    });
  </script>
</body>
</html>
